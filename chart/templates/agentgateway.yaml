{{- if .Values.agentgateway.enabled }}
{{- $pathBase := default .Release.Name .Values.agentgateway.pathBase }}
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: {{ include "sanctions-law-mcp.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sanctions-law-mcp.labels" . | nindent 4 }}
spec:
  mcp:
    targets:
      - name: {{ include "sanctions-law-mcp.fullname" . }}
        static:
          host: {{ include "sanctions-law-mcp.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local
          port: {{ .Values.service.port }}
          protocol: StreamableHTTP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "sanctions-law-mcp.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sanctions-law-mcp.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.agentgateway.gatewayName }}
      namespace: {{ .Values.agentgateway.namespace }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /{{ $pathBase }}
      backendRefs:
        - name: {{ include "sanctions-law-mcp.fullname" . }}
          group: agentgateway.dev
          kind: AgentgatewayBackend
{{- end }}
